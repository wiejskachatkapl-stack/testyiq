<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#061323"><link rel="manifest" href="manifest.webmanifest"><title>Test IQ</title><style>
:root{--cyan:#32d7ff;--blue:#4378ff;--ink:#091727;--muted:#7ca4be}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,Segoe UI,Arial,sans-serif}body{min-height:100dvh;color:#fff;background:radial-gradient(circle at 50% -15%,#175480 0,#08233d 34%,#04101d 76%);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(82,193,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(82,193,255,.045) 1px,transparent 1px);background-size:36px 36px}.app{width:min(1180px,100%);min-height:100dvh;margin:auto;padding:clamp(10px,2vw,24px);display:flex;flex-direction:column}.topbar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px;margin-bottom:12px}.back{width:46px;height:46px;border-radius:14px;border:1px solid #2e7da9;background:rgba(8,35,58,.9);color:#fff;font-size:26px;cursor:pointer}.progressbox{min-width:0}.progressline{height:9px;border-radius:99px;background:#0b2943;overflow:hidden;border:1px solid rgba(71,171,226,.18)}.fill{height:100%;width:10%;background:linear-gradient(90deg,var(--cyan),var(--blue));transition:.3s}.counter{margin-top:6px;color:#a8cee4;font-size:12px;font-weight:800}.timer{font-weight:900;color:#fff;background:#0a2c49;border:1px solid #2f83b1;padding:11px 14px;border-radius:14px;min-width:74px;text-align:center}.quiz{flex:1;display:grid;grid-template-columns:minmax(0,1.18fr) minmax(320px,.82fr);gap:18px;min-height:0}.stage,.side{border:1px solid rgba(80,190,246,.28);border-radius:25px;background:linear-gradient(180deg,rgba(10,36,61,.9),rgba(5,20,35,.95));box-shadow:0 24px 70px rgba(0,0,0,.3)}.stage{padding:clamp(14px,2vw,24px);display:flex;flex-direction:column;min-height:0}.title{font-size:13px;font-weight:900;letter-spacing:1.4px;color:#75ddff}.question{font-size:clamp(20px,2.3vw,30px);font-weight:900;line-height:1.22;margin:8px 0 13px}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.chip{font-size:11px;font-weight:800;color:#bcecff;padding:6px 9px;border-radius:999px;border:1px solid #2e789f;background:#0a2942}.visual{flex:1;min-height:260px;display:grid;place-items:center;border-radius:20px;background:linear-gradient(180deg,#f9fcff,#e8f3f8);overflow:hidden;padding:14px}.visual svg{display:block;width:min(100%,650px);height:min(52vh,480px);max-height:100%;filter:drop-shadow(0 9px 12px rgba(13,48,74,.12))}.side{padding:18px;display:flex;flex-direction:column}.side h3{margin:0 0 14px;font-size:17px;color:#bcecff}.answers{display:grid;gap:11px}.answer{position:relative;width:100%;min-height:60px;border-radius:17px;border:1px solid #2d7198;background:linear-gradient(180deg,#0e3a60,#0a2945);color:#fff;padding:13px 14px 13px 60px;text-align:left;font-size:16px;font-weight:800;cursor:pointer;transition:.18s}.answer:before{content:attr(data-letter);position:absolute;left:12px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(135deg,#24ccff,#486cff);box-shadow:0 5px 15px #146ab855}.answer:hover{transform:translateY(-2px);border-color:#55d8ff}.footnote{margin-top:auto;padding-top:16px;color:#638da8;font-size:12px;line-height:1.45}.result{display:none;max-width:730px;width:100%;margin:auto;text-align:center;border:1px solid #3388b5;border-radius:28px;background:linear-gradient(180deg,#0c2b49,#061827);padding:clamp(20px,4vw,38px);box-shadow:0 30px 90px #0008}.result h1{margin:0;color:#85e5ff}.score{font-size:clamp(58px,10vw,94px);font-weight:1000;line-height:1;margin:20px 0;background:linear-gradient(90deg,#fff,#4bdcff,#637cff);-webkit-background-clip:text;color:transparent}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:22px 0}.stat{padding:16px;border:1px solid #26688f;border-radius:17px;background:#09233b}.stat small{display:block;color:#86b9d4}.stat b{display:block;margin-top:5px;font-size:23px}.btn{border:0;border-radius:17px;padding:16px 22px;color:white;font-size:17px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#20c9ff,#3f6cff)}.adOverlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(2,9,16,.94);backdrop-filter:blur(9px)}.adCard{width:min(430px,100%);text-align:center;border:1px solid #347da4;border-radius:25px;padding:22px;background:#09233a}.adMock{height:260px;border-radius:17px;margin:14px 0;display:grid;place-items:center;background:linear-gradient(135deg,#eff7fb,#c8dfe9);color:#17364a}.adMock b{font-size:30px}.adSkip{width:100%;border:0;border-radius:15px;padding:15px;background:#183c55;color:#7799ae;font-weight:900}.adSkip.ready{background:linear-gradient(135deg,#21cfff,#416cff);color:#fff;cursor:pointer}
@media(max-width:760px){.app{padding:9px}.topbar{gap:9px;margin-bottom:9px}.back{width:40px;height:40px}.timer{padding:9px;min-width:67px}.quiz{display:flex;flex-direction:column;gap:9px}.stage,.side{border-radius:20px}.stage{padding:12px}.question{font-size:18px;margin:5px 0 8px}.meta{margin-bottom:7px}.visual{min-height:0;height:clamp(210px,38dvh,310px);padding:8px}.visual svg{width:100%;height:100%;max-height:none}.side{padding:11px}.side h3{display:none}.answers{gap:8px;grid-template-columns:1fr}.answer{min-height:49px;padding:9px 10px 9px 52px;font-size:14px;border-radius:14px}.answer:before{width:31px;height:31px;border-radius:9px}.footnote{display:none}.stats{grid-template-columns:1fr 1fr}}@media(max-height:690px) and (max-width:760px){.visual{height:230px}.question{font-size:16px}.answer{min-height:43px;padding-top:7px;padding-bottom:7px}.meta{display:none}}
</style></head><body><main class="app"><div class="topbar"><button class="back" onclick="location.href='index.html'">‹</button><div class="progressbox"><div class="progressline"><div id="fill" class="fill"></div></div><div id="counter" class="counter"></div></div><div id="timer" class="timer">00:00</div></div><section id="quiz" class="quiz"><div class="stage"><div id="title" class="title"></div><div id="question" class="question"></div><div class="meta"><span id="category" class="chip"></span><span id="difficulty" class="chip"></span><span class="chip">GENEROWANE</span></div><div id="visual" class="visual"></div></div><aside class="side"><h3>Wybierz jedną odpowiedź</h3><div id="answers" class="answers"></div><div class="footnote">Pytanie zostało wygenerowane automatycznie. Każdy nowy test tworzy inny zestaw.</div></aside></section><section id="result" class="result"><h1>TWÓJ WYNIK</h1><p id="person"></p><div id="score" class="score"></div><div id="stats" class="stats"></div><button class="btn" onclick="location.href='index.html'">NOWY TEST</button></section></main><div id="adOverlay" class="adOverlay"><div class="adCard"><small>PRZYKŁADOWA REKLAMA</small><div class="adMock"><div><b>REKLAMA</b><br><span>Tu pojawi się AdSense</span></div></div><p id="adCount">Wynik pojawi się za 5 sekund</p><button id="adSkip" class="adSkip" disabled>POKAŻ WYNIK</button></div></div><script>
const C='#123d59', letters=['A','B','C','D','E'];
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const shuffle=a=>{a=[...a];for(let i=a.length-1;i>0;i--){const j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]]}return a};
const uniqueOptions=(correct, maker)=>{const set=new Set([String(correct)]);let guard=0;while(set.size<5&&guard++<200)set.add(String(maker()));return shuffle([...set]).map(x=>({text:x,correct:String(x)===String(correct)}))};
function numberSequence(level){const start=rnd(1,9), step=rnd(2,4+level), mode=rnd(0,2);let seq=[],answer,rule;if(mode===0){for(let i=0;i<5;i++)seq.push(start+i*step);answer=start+5*step;rule=`+${step}`;}else if(mode===1){for(let i=0;i<5;i++)seq.push(start+i*i);answer=start+25;rule='rosnące różnice';}else{let a=start,b=rnd(2,6);seq=[a,b];for(let i=2;i<5;i++)seq.push(seq[i-1]+seq[i-2]);answer=seq[3]+seq[4];rule='suma dwóch poprzednich';}const opts=uniqueOptions(answer,()=>answer+rnd(-8,8)||answer+1);return {category:'CIĄGI LICZBOWE',difficulty:level,q:'Jaka liczba powinna znaleźć się w pustym polu?',v:`<svg viewBox="0 0 700 260"><g>${seq.map((n,i)=>`<rect x="${35+i*112}" y="70" width="88" height="88" rx="18" fill="white" stroke="${C}" stroke-width="4"/><text x="${79+i*112}" y="124" text-anchor="middle" font-size="31" font-weight="900" fill="${C}">${n}</text>`).join('')}<rect x="595" y="70" width="88" height="88" rx="18" fill="#dff5ff" stroke="${C}" stroke-width="4"/><text x="639" y="127" text-anchor="middle" font-size="38" font-weight="900" fill="${C}">?</text><text x="350" y="220" text-anchor="middle" font-size="17" fill="#66889b">Znajdź regułę ciągu</text></g></svg>`,a:opts};}
function rotation(level){const shapes=['▲','◆','➤','✦'],shape=shapes[rnd(0,shapes.length-1)],step=[45,90,135][rnd(0,Math.min(2,Math.floor(level/3)))],angles=[0,step,step*2,step*3],answer=(step*4)%360;const opts=uniqueOptions(answer,()=>[0,45,90,135,180,225,270,315][rnd(0,7)]);return {category:'OBRÓT FIGUR',difficulty:level,q:'Który obrót figury jest następnym elementem sekwencji?',v:`<svg viewBox="0 0 700 280"><g fill="${C}" font-size="70" text-anchor="middle">${angles.map((a,i)=>`<g transform="translate(${90+i*145},125) rotate(${a})"><text x="0" y="25">${shape}</text></g>`).join('')}<rect x="595" y="75" width="90" height="100" rx="18" fill="#e4f6ff" stroke="${C}" stroke-width="4"/><text x="640" y="142" font-size="42" fill="${C}">?</text></g></svg>`,a:opts.map(o=>({...o,text:o.text+'°'}))};}
function oddOne(level){const nums=[];const base=rnd(2,8),kind=rnd(0,2);let correct;if(kind===0){for(let i=1;i<=4;i++)nums.push(base*i);correct=base*rnd(5,7)+1;}else if(kind===1){for(let i=2;i<=5;i++)nums.push(i*i);correct=rnd(3,8)*2+1;}else{for(let i=0;i<4;i++)nums.push(2**(i+1));correct=18;}const all=shuffle([...nums,correct]);const opts=all.map(x=>({text:String(x),correct:x===correct}));return {category:'ODSTAJĄCY ELEMENT',difficulty:level,q:'Która liczba nie pasuje do pozostałych?',v:`<svg viewBox="0 0 700 280"><g>${all.map((n,i)=>`<circle cx="${80+i*135}" cy="130" r="52" fill="white" stroke="${C}" stroke-width="4"/><text x="${80+i*135}" y="143" text-anchor="middle" font-size="34" font-weight="900" fill="${C}">${n}</text>`).join('')}</g></svg>`,a:opts};}
function matrixCount(level){const a=rnd(1,4),b=rnd(1,4),c=a+b,d=b+1,e=c+d,answer=e+c;const vals=[a,b,c,d,e];const opts=uniqueOptions(answer,()=>answer+rnd(-5,5));const dots=n=>Array.from({length:n},(_,i)=>`<circle cx="${20+(i%4)*18}" cy="${18+Math.floor(i/4)*18}" r="6" fill="${C}"/>`).join('');return {category:'MATRYCE',difficulty:level,q:'Ile kropek powinno znaleźć się w ostatnim polu?',v:`<svg viewBox="0 0 700 360"><g transform="translate(190 35)">${vals.map((n,i)=>{const r=Math.floor(i/3),col=i%3;return `<rect x="${col*110}" y="${r*110}" width="90" height="90" rx="12" fill="white" stroke="${C}" stroke-width="4"/><g transform="translate(${col*110+8} ${r*110+8})">${dots(n)}</g>`}).join('')}<rect x="220" y="110" width="90" height="90" rx="12" fill="#e4f6ff" stroke="${C}" stroke-width="4"/><text x="265" y="168" text-anchor="middle" font-size="42" font-weight="900" fill="${C}">?</text></g></svg>`,a:opts};}
function letterSequence(level){const start=rnd(0,8),step=rnd(1,Math.min(4,1+Math.floor(level/2))),chars=[];for(let i=0;i<5;i++)chars.push(String.fromCharCode(65+start+i*step));const answer=String.fromCharCode(65+start+5*step);const opts=uniqueOptions(answer,()=>String.fromCharCode(65+rnd(0,25)));return {category:'SEKWENCJE LITER',difficulty:level,q:'Jaka litera kontynuuje sekwencję?',v:`<svg viewBox="0 0 700 260"><g>${chars.map((n,i)=>`<rect x="${35+i*112}" y="70" width="88" height="88" rx="18" fill="white" stroke="${C}" stroke-width="4"/><text x="${79+i*112}" y="128" text-anchor="middle" font-size="36" font-weight="900" fill="${C}">${n}</text>`).join('')}<rect x="595" y="70" width="88" height="88" rx="18" fill="#dff5ff" stroke="${C}" stroke-width="4"/><text x="639" y="127" text-anchor="middle" font-size="38" font-weight="900" fill="${C}">?</text></g></svg>`,a:opts};}
const factories=[numberSequence,rotation,oddOne,matrixCount,letterSequence];
let i=0,correct=0,level=4,streak=0;const total=10,startedAt=Date.now(),times=[],cats={};let qStart=Date.now(),current;
function nextQuestion(){const f=factories[rnd(0,factories.length-1)];current=f(level);current.a=shuffle(current.a);qStart=Date.now();}
function fmt(sec){return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0')}
setInterval(()=>{const t=document.getElementById('timer');if(t)t.textContent=fmt(Math.floor((Date.now()-startedAt)/1000))},1000);
function render(){if(!current)nextQuestion();title.textContent=`ZADANIE ${i+1}`;question.textContent=current.q;category.textContent=current.category;difficulty.textContent=`POZIOM ${current.difficulty}/10`;visual.innerHTML=current.v;answers.innerHTML='';current.a.forEach((o,n)=>{const b=document.createElement('button');b.className='answer';b.dataset.letter=letters[n];b.textContent=o.text;b.onclick=()=>answer(o.correct);answers.appendChild(b)});counter.textContent=`${i+1} / ${total}`;fill.style.width=`${(i+1)/total*100}%`}
function answer(ok){times.push((Date.now()-qStart)/1000);cats[current.category]=(cats[current.category]||0)+(ok?1:0);if(ok){correct++;streak++;if(streak>=2){level=Math.min(10,level+1);streak=0}}else{streak=0;level=Math.max(1,level-1)}i++;if(i<total){nextQuestion();render()}else finish()}
function finish(){quiz.style.display='none';showSampleAd(()=>{result.style.display='block';const u=JSON.parse(localStorage.getItem('iqUser')||'{}'),pct=Math.round(correct/total*100),elapsed=Math.floor((Date.now()-startedAt)/1000),avg=Math.round(times.reduce((a,b)=>a+b,0)/times.length);let ageAdj=u.age<16?2:u.age>=55?3:0,est=Math.max(70,Math.min(145,76+correct*5+Math.round(level*1.3)+ageAdj)),cent=Math.max(2,Math.min(99,Math.round(50+(est-100)*1.55)));score.textContent=`${correct} / ${total}`;person.textContent=`${u.firstName||''} ${u.lastName||''}`;stats.innerHTML=`<div class="stat"><small>Poprawność</small><b>${pct}%</b></div><div class="stat"><small>Czas testu</small><b>${fmt(elapsed)}</b></div><div class="stat"><small>Średnio na pytanie</small><b>${avg}s</b></div><div class="stat"><small>Osiągnięty poziom</small><b>${level}/10</b></div><div class="stat"><small>Szacowany wynik</small><b>${est}</b></div><div class="stat"><small>Orientacyjny centyl</small><b>${cent}%</b></div>`})}
function showSampleAd(done){let left=5;adOverlay.style.display='flex';adCount.textContent=`Wynik pojawi się za ${left} sekund`;adSkip.disabled=true;adSkip.classList.remove('ready');const tm=setInterval(()=>{left--;if(left>0)adCount.textContent=`Wynik pojawi się za ${left} ${left===1?'sekundę':'sekundy'}`;else{clearInterval(tm);adCount.textContent='Reklama zakończona';adSkip.disabled=false;adSkip.classList.add('ready')}},1000);adSkip.onclick=()=>{if(adSkip.disabled)return;adOverlay.style.display='none';done()}}
nextQuestion();render();if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js');
</script></body></html>
