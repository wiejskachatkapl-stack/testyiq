<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>IQ Challenge - Test</title><link rel="manifest" href="manifest.webmanifest"><meta name="theme-color" content="#030b1d"><link rel="apple-touch-icon" href="assets/icons/icon-192.png"><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020716;color:#fff;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}body{min-height:100dvh;display:grid;place-items:start center;padding:10px;background:radial-gradient(circle at 20% 8%,rgba(43,223,255,.28),transparent 25%),radial-gradient(circle at 50% 100%,rgba(18,76,255,.25),transparent 35%),linear-gradient(160deg,#020716,#071833 55%,#020716)}.app{width:min(430px,100%);min-height:calc(100dvh - 20px);border-radius:26px;border:1px solid rgba(119,229,255,.48);padding:12px;background:linear-gradient(180deg,rgba(8,28,60,.96),rgba(2,8,23,.96));box-shadow:0 28px 90px rgba(0,0,0,.62);position:relative;overflow:hidden}.app:before{content:"";position:absolute;inset:0;opacity:.13;background-image:linear-gradient(rgba(98,224,255,.28) 1px,transparent 1px),linear-gradient(90deg,rgba(98,224,255,.28) 1px,transparent 1px);background-size:30px 30px}.inner{position:relative;z-index:1}.top{display:flex;justify-content:space-between;align-items:center;gap:8px}.back,.counter{border:1px solid rgba(142,231,255,.45);border-radius:14px;padding:9px 11px;background:rgba(255,255,255,.07);color:#e8fbff;text-decoration:none;font-weight:1000;font-size:13px}.title{text-align:center;margin:12px auto 8px;width:max-content;max-width:100%;padding:8px 18px;border-radius:14px;background:linear-gradient(180deg,#17477b,#071833);font-size:28px;font-weight:1000;letter-spacing:2px}.user{text-align:center;color:#83edff;font-size:13px;font-weight:900;margin-bottom:8px}.card{background:#f8fbff;color:#06142a;border-radius:22px;padding:14px;border:1px solid rgba(142,231,255,.55)}.desc{text-align:center;font-size:16px;line-height:1.25;font-weight:850;margin:0 0 10px}.diagram{display:block;width:min(100%,340px);margin:0 auto}.question{text-align:center;font-size:19px;font-weight:1000;margin:8px 0}.answers{display:grid;grid-template-columns:1fr;gap:8px;max-width:310px;margin:0 auto}.answer{height:54px;border-radius:13px;border:2px solid #cbd5e1;background:white;font-size:31px;font-weight:1000;color:#06142a}.answer.selected{border-color:#0870e8;background:#eaf7ff}.answer.correct{background:#168a34;color:#fff;border-color:#168a34}.answer.wrong{background:#b3261e;color:#fff;border-color:#b3261e}.check{width:100%;margin-top:12px;border:0;border-radius:18px;padding:14px;background:linear-gradient(180deg,#24d8ff,#0862e3);box-shadow:0 7px 0 #063b8b;color:#fff;font-size:18px;font-weight:1000}.msg{text-align:center;min-height:28px;margin-top:10px;font-weight:1000;font-size:18px}@media(orientation:landscape) and (max-height:520px){body:before{content:"Obróć telefon pionowo";position:fixed;inset:0;z-index:99;display:grid;place-items:center;text-align:center;background:#020716;color:#fff;font-size:28px;font-weight:1000}.app{display:none}}</style></head><body><main class="app"><div class="inner"><div class="top"><a href="index.html?v=5" class="back">← START</a><div class="counter">1 / 100</div></div><div class="title">ZADANIE 1</div><div class="user" id="user"></div><section class="card"><p class="desc">Litery i liczby w kole są ułożone według zasady. Wybierz brakującą literę.</p><svg class="diagram" viewBox="0 0 600 600"><defs><style>.o{fill:#fff;stroke:#06142a;stroke-width:7}.l{stroke:#06142a;stroke-width:4;stroke-linecap:round}.t{font:900 46px Arial;fill:#06142a;text-anchor:middle;dominant-baseline:middle}.a{font:900 50px Arial;fill:#06142a;text-anchor:middle;dominant-baseline:middle}</style></defs><circle class="o" cx="300" cy="300" r="270"/><line class="l" x1="300" y1="30" x2="300" y2="570"/><line class="l" x1="30" y1="300" x2="570" y2="300"/><line class="l" x1="109" y1="109" x2="491" y2="491"/><line class="l" x1="491" y1="109" x2="109" y2="491"/><text class="t" x="390" y="78">6</text><text class="t" x="510" y="205">12</text><text class="t" x="510" y="395">21</text><text class="t" x="390" y="522">9</text><text class="t" x="210" y="522">3</text><text class="t" x="90" y="395">24</text><text class="t" x="90" y="205">18</text><text class="t" x="210" y="78">15</text><text class="a" x="350" y="185">?</text><text class="a" x="425" y="260">P</text><text class="a" x="390" y="350">L</text><text class="a" x="350" y="425">J</text><text class="a" x="250" y="425">D</text><text class="a" x="210" y="350">H</text><text class="a" x="175" y="260">N</text><text class="a" x="250" y="185">F</text></svg><div class="question">Wybierz odpowiedź:</div><div class="answers" id="answers"></div><button class="check" id="check">SPRAWDŹ</button><div class="msg" id="msg"></div></section></div></main><script>const u=JSON.parse(localStorage.getItem('iqUserData')||'{}');if(u.firstName)user.textContent=u.firstName+' '+u.lastName+' • wiek: '+u.age;const opts=['A','B','D','G','M'],correct='B';let sel=null;opts.forEach(x=>{let b=document.createElement('button');b.className='answer';b.textContent=x;b.onclick=()=>{sel=x;document.querySelectorAll('.answer').forEach(e=>e.classList.remove('selected'));b.classList.add('selected');msg.textContent=''};answers.appendChild(b)});check.onclick=()=>{if(!sel){msg.textContent='Wybierz odpowiedź.';msg.style.color='#b26b00';return}document.querySelectorAll('.answer').forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('correct');if(b.textContent===sel&&sel!==correct)b.classList.add('wrong')});msg.textContent=sel===correct?'Dobrze!':'Błąd. Poprawna odpowiedź: B';msg.style.color=sel===correct?'#168a34':'#b3261e'};if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js?v=5'))}try{screen.orientation&&screen.orientation.lock&&screen.orientation.lock('portrait').catch(()=>{})}catch(e){}</script></body></html>
