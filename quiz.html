<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#071526"><link rel="manifest" href="manifest.webmanifest"><title>Test IQ</title><style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at 50% 0,#12395d 0,#071526 50%,#030812 100%);color:#fff}body{min-height:100dvh}.wrap{width:min(100%,560px);margin:auto;min-height:100dvh;padding:14px;display:flex;flex-direction:column}.top{display:flex;align-items:center;gap:12px;padding:7px 2px 12px}.back{width:42px;height:42px;border-radius:13px;border:1px solid #307fb0;background:#0a2137;color:#fff;font-size:23px}.progress{flex:1}.bar{height:8px;background:#0b253c;border-radius:20px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#00c2ff,#3974ff);width:10%}.counter{text-align:right;color:#8edcff;font-size:13px;margin-top:5px}.card{background:#f8fbff;color:#071526;border-radius:24px;padding:18px 14px 20px;box-shadow:0 20px 60px #0008;border:2px solid #53bff0;flex:1;display:flex;flex-direction:column}.title{text-align:center;font-weight:900;font-size:21px;margin:0 0 8px}.question{text-align:center;font-weight:700;font-size:16px;line-height:1.35;margin-bottom:10px}.visual{min-height:260px;display:grid;place-items:center;margin:4px 0 12px}.visual svg{width:100%;max-height:330px}.answers{display:grid;grid-template-columns:1fr;gap:9px;margin-top:auto}.answer{border:1px solid #9ecdeb;background:#fff;color:#071526;border-radius:15px;padding:13px 12px;font-weight:800;font-size:16px;text-align:center;cursor:pointer;box-shadow:0 4px 10px #0b4a7820}.answer:active{transform:scale(.98)}.result{display:none;text-align:center}.score{font-size:62px;font-weight:950;color:#117bd9;margin:15px 0 0}.result h2{font-size:28px}.statbox{background:#eaf6ff;border-radius:18px;padding:14px;margin:12px 0;text-align:left;line-height:1.8}.restart{border:0;border-radius:16px;padding:16px;background:linear-gradient(#13b9ff,#1562df);color:#fff;font-size:18px;font-weight:900;width:100%}@media(max-height:730px){.visual{min-height:205px}.visual svg{max-height:250px}.answer{padding:10px}.card{padding-top:12px}.question{font-size:14px}}
</style></head><body><main class="wrap"><div class="top"><button class="back" onclick="location.href='index.html'">‹</button><div class="progress"><div class="bar"><div class="fill" id="fill"></div></div><div class="counter" id="counter">1 / 10</div></div></div><section class="card"><div id="quiz"><h1 class="title" id="title">ZADANIE 1</h1><div class="question" id="question"></div><div class="visual" id="visual"></div><div class="answers" id="answers"></div></div><div class="result" id="result"><h2>Wynik testu</h2><div class="score" id="score"></div><p id="person"></p><div class="statbox" id="stats"></div><button class="restart" onclick="location.href='index.html'">NOWY TEST</button></div></section></main><script>
const C='#0b1c2f',S='#1384c6';
const circle=(cx,cy,r,txt,fs=20)=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="white" stroke="${C}" stroke-width="4"/><text x="${cx}" y="${cy+fs/3}" text-anchor="middle" font-size="${fs}" font-weight="800" fill="${C}">${txt}</text>`;
function q1(){return `<svg viewBox="0 0 360 260">${[['15',85,55],['47',180,45],['23',270,80],['41',225,155],['19',140,130],['67',80,120],['53',90,205]].map(a=>circle(a[1],a[2],31,a[0],22)).join('')}</svg>`}
function q2(){return `<svg viewBox="0 0 360 250"><g stroke="${C}" stroke-width="4" fill="none"><polygon points="180,20 300,210 60,210"/><polygon points="180,230 60,40 300,40"/></g><g font-size="28" font-weight="800" fill="${C}" text-anchor="middle"><text x="180" y="57">D</text><text x="278" y="92">7</text><text x="275" y="195">J</text><text x="180" y="220">13</text><text x="84" y="195">P</text><text x="82" y="92">?</text></g></svg>`}
function q3(){return `<svg viewBox="0 0 360 285"><g font-size="24" font-weight="900" fill="${C}" text-anchor="middle"><text x="180" y="30">2</text><text x="180" y="78">5</text><text x="180" y="126">9</text><text x="180" y="174">14</text><text x="180" y="222">20</text><text x="180" y="270">?</text></g></svg>`}
function q4(){return `<svg viewBox="0 0 360 280"><rect x="65" y="25" width="230" height="230" rx="12" fill="#fff" stroke="${C}" stroke-width="4"/><rect x="95" y="55" width="170" height="170" fill="#eaf3f8"/><g fill="${C}" font-size="24" text-anchor="middle"><text x="78" y="50">E</text><text x="125" y="50">6</text><text x="220" y="50">8</text><text x="282" y="50">K</text><text x="282" y="105">15</text><text x="282" y="190">20</text><text x="282" y="245">U</text><text x="220" y="245">23</text><text x="125" y="245">26</text><text x="78" y="245">D</text><text x="78" y="190">9</text><text x="78" y="105">?</text></g></svg>`}
function clock(cx,cy,h,m,label){let a1=(h%12)*30-90,a2=m*6-90;let x1=cx+38*Math.cos(a1*Math.PI/180),y1=cy+38*Math.sin(a1*Math.PI/180),x2=cx+52*Math.cos(a2*Math.PI/180),y2=cy+52*Math.sin(a2*Math.PI/180);let nums='';for(let n=1;n<=12;n++){let a=n*30-90;nums+=`<text x="${cx+66*Math.cos(a*Math.PI/180)}" y="${cy+66*Math.sin(a*Math.PI/180)+4}" text-anchor="middle" font-size="11">${n}</text>`}return `<text x="${cx-78}" y="${cy-70}" font-weight="800">${label}</text><circle cx="${cx}" cy="${cy}" r="75" fill="white" stroke="${C}" stroke-width="4"/>${nums}<line x1="${cx}" y1="${cy}" x2="${x1}" y2="${y1}" stroke="${C}" stroke-width="5"/><line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="${C}" stroke-width="3"/><circle cx="${cx}" cy="${cy}" r="5" fill="${C}"/>`}
function q5(){return `<svg viewBox="0 0 360 360">${clock(95,90,3,0,'1')}${clock(265,90,12,15,'2')}${clock(95,265,9,30,'3')}<text x="187" y="190" font-size="30" font-weight="900">?</text><circle cx="265" cy="265" r="75" fill="white" stroke="${C}" stroke-width="4"/></svg>`}
function q6(){return `<svg viewBox="0 0 360 300"><g font-weight="900" font-size="18" fill="${C}" text-anchor="middle"><text x="180" y="25">A: liczby</text><text x="180" y="50">3 • 5 • 9 • 6 • 4 • 8 • 2 • 7</text><text x="180" y="95">B: kwadraty</text><text x="180" y="120">9 • 25 • 81 • 36 • 16 • 64 • 4 • 49</text><text x="180" y="165">C: sześciany</text><text x="180" y="195">? • 125 • 729 • 216</text><text x="180" y="222">64 • 512 • 8 • 343</text></g></svg>`}
function q7(){return `<svg viewBox="0 0 360 300"><g font-size="21" font-weight="900" fill="${C}" text-anchor="middle"><text x="180" y="28">ACCOHGI</text><text x="180" y="60">WLKEEMUIA</text><text x="180" y="92">UTSOONH</text><text x="180" y="124">BEELUQAUQRU</text><text x="180" y="156">RTOEIDT</text><text x="180" y="188">AAATTLN</text><text x="180" y="220">XPEHOIN</text><text x="180" y="252">PMHEIMS</text></g></svg>`}
function person(x,y,arms=0,feet=0,hat=0){let p=`<circle cx="${x}" cy="${y-35}" r="7" fill="${C}"/><line x1="${x}" y1="${y-28}" x2="${x}" y2="${y+20}"/><line x1="${x}" y1="${y+20}" x2="${x-18}" y2="${y+55}"/><line x1="${x}" y1="${y+20}" x2="${x+18}" y2="${y+55}"/><line x1="${x}" y1="${y-18}" x2="${x-20}" y2="${y+10}"/><line x1="${x}" y1="${y-18}" x2="${x+20}" y2="${y+10}"/>`;if(arms&1)p+=`<line x1="${x-20}" y1="${y+10}" x2="${x-28}" y2="${y}"/>`;if(arms&2)p+=`<line x1="${x+20}" y1="${y+10}" x2="${x+28}" y2="${y}"/>`;if(feet&1)p+=`<line x1="${x-18}" y1="${y+55}" x2="${x-30}" y2="${y+55}"/>`;if(feet&2)p+=`<line x1="${x+18}" y1="${y+55}" x2="${x+30}" y2="${y+55}"/>`;if(hat)p+=`<line x1="${x-12}" y1="${y-44}" x2="${x+12}" y2="${y-44}"/><line x1="${x}" y1="${y-44}" x2="${x+5}" y2="${y-58}"/>`;return `<g stroke="${C}" stroke-width="4" stroke-linecap="round">${p}</g>`}
function q8(){let arr=[[70,55,0,0,0,'A'],[180,55,3,0,0,'B'],[290,55,1,0,0,'C'],[70,155,3,3,0,'D'],[180,155,3,0,0,'E'],[290,155,3,3,1,'F']];return `<svg viewBox="0 0 360 280">${arr.map(a=>person(...a.slice(0,5))+`<text x="${a[0]-35}" y="${a[1]-45}" font-weight="900">${a[5]}</text>`).join('')}<text x="180" y="270" text-anchor="middle" font-size="18" font-weight="900" fill="${C}">Wybierz kontynuację: G, H lub I</text></svg>`}
function face(x,y,t,label){let e=t===4?'×':'●',mouth=t===4?'M':'Q';return `<g stroke="${C}" stroke-width="3" fill="none"><circle cx="${x}" cy="${y}" r="45"/><text x="${x-25}" y="${y-5}" fill="${C}" stroke="none" font-size="18">${e}</text><text x="${x+15}" y="${y-5}" fill="${C}" stroke="none" font-size="18">${e}</text><path d="M${x-18} ${y+18} Q${x} ${y+(t===4?5:35)} ${x+18} ${y+18}"/></g><text x="${x-55}" y="${y-40}" font-weight="900" fill="${C}">${label}</text>`}
function q9(){return `<svg viewBox="0 0 360 250">${face(75,65,0,'A')}${face(180,65,1,'B')}${face(285,65,2,'C')}${face(125,180,3,'D')}${face(240,180,4,'E')}</svg>`}
function q10(){return `<svg viewBox="0 0 360 300"><g font-size="18" font-weight="900" fill="${C}" text-anchor="middle"><text x="180" y="25">13 5 11 15 14 7</text><text x="180" y="55">15 18 9 14 15 11 15</text><text x="180" y="85">13 9 19 19 9 19 19 9 16 16 9</text><text x="180" y="115">2 18 1 8 13 1 16 21 20 18 1</text><text x="180" y="145">1 13 1 26 15 14 11 1</text><text x="180" y="175">13 9 19 19 15 21 18 9</text><text x="180" y="205">26 1 13 2 5 26 9</text><text x="180" y="235">20 1 13 9 26 1</text></g></svg>`}
const questions=[
{q:'Która kula nie pasuje do pozostałych?',v:q1,a:['15','19','23','47','67'],c:0},
{q:'Jaka litera uzupełnia układ?',v:q2,a:['R','S','T','U','W'],c:1},
{q:'Jaka liczba stanowi kontynuację ciągu?',v:q3,a:['24','25','26','27','28'],c:3},
{q:'Jaką liczbę należy wpisać zamiast znaku zapytania?',v:q4,a:['8','10','12','14','16'],c:1},
{q:'Jaka godzina powinna znaleźć się na czwartym zegarze?',v:q5,a:['3:45','6:45','9:15','6:30','12:45'],c:1},
{q:'Jaka liczba powinna znaleźć się w pustym polu koła C?',v:q6,a:['9','18','27','36','81'],c:2},
{q:'Który zestaw prawidłowo rozszyfrowuje wszystkie nazwy miast?',v:q7,a:['Chicago, Milwaukee, Houston, Albuquerque, Detroit, Atlanta, Phoenix, Memphis','Chicago, Miami, Houston, Boston, Detroit, Atlanta, Phoenix, Memphis','Denver, Milwaukee, Houston, Albuquerque, Dallas, Atlanta, Phoenix, Memphis','Chicago, Seattle, Houston, Albuquerque, Detroit, Austin, Phoenix, Memphis','Chicago, Milwaukee, Orlando, Albuquerque, Detroit, Atlanta, Phoenix, Memphis'],c:0},
{q:'Który ludzik stanowi kontynuację przedstawionego ciągu?',v:q8,a:['G','H','I','A','F'],c:2},
{q:'Która twarz nie pasuje do pozostałych?',v:q9,a:['A','B','C','D','E'],c:4},
{q:'Który zestaw zawiera wszystkie osiem nazw rzek zapisanych liczbami A=1, B=2 itd.?',v:q10,a:['Mekong, Orinoko, Missisipi, Brahmaputra, Amazonka, Missouri, Zambezi, Tamiza','Mekong, Nil, Missisipi, Brahmaputra, Amazonka, Missouri, Zambezi, Tamiza','Mekong, Orinoko, Dunaj, Brahmaputra, Amazonka, Missouri, Zambezi, Tamiza','Mekong, Orinoko, Missisipi, Ganges, Amazonka, Missouri, Zambezi, Tamiza','Mekong, Orinoko, Missisipi, Brahmaputra, Amazonka, Kolorado, Zambezi, Tamiza'],c:0}
];
let i=0,correct=0;function render(){let x=questions[i];title.textContent=`ZADANIE ${i+1}`;question.textContent=x.q;visual.innerHTML=x.v();answers.innerHTML='';x.a.forEach((t,n)=>{let b=document.createElement('button');b.className='answer';b.textContent=t;b.onclick=()=>{if(n===x.c)correct++;i++;if(i<questions.length)render();else finish()};answers.appendChild(b)});counter.textContent=`${i+1} / ${questions.length}`;fill.style.width=`${(i+1)/questions.length*100}%`}
function finish(){quiz.style.display='none';result.style.display='block';let u=JSON.parse(localStorage.getItem('iqUser')||'{}');let pct=Math.round(correct/questions.length*100);let ageAdj=u.age<16?2:u.age>=55?3:0;let est=Math.max(70,Math.min(145,75+correct*6+ageAdj));let cent=Math.max(2,Math.min(99,Math.round(50+(est-100)*1.55)));score.textContent=`${correct} / ${questions.length}`;person.textContent=`${u.firstName||''} ${u.lastName||''}`;stats.innerHTML=`<b>Poprawne odpowiedzi:</b> ${correct}<br><b>Wynik procentowy:</b> ${pct}%<br><b>Wiek:</b> ${u.age||'-'}<br><b>Szacowany wynik porównawczy:</b> ${est}<br><b>Orientacyjny centyl:</b> ${cent}%<br><small>Wynik ma charakter rozrywkowy i nie jest diagnozą psychologiczną.</small>`}
render();if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js');
</script></body></html>
