<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#06142a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="IQ Test" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <title>Zadanie 89</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Inter,Arial,Helvetica,sans-serif;color:#eef8ff;background:#020817;overflow-x:hidden}
    body{min-height:100dvh;display:flex;justify-content:center;align-items:flex-start;padding:clamp(8px,2vw,22px);background:radial-gradient(circle at 15% 15%,rgba(34,180,255,.25),transparent 30%),radial-gradient(circle at 85% 12%,rgba(69,255,209,.15),transparent 25%),radial-gradient(circle at 50% 105%,rgba(20,95,255,.26),transparent 36%),linear-gradient(135deg,#020817 0%,#06142a 48%,#010713 100%)}
    .app{position:relative;width:min(980px,100%);min-height:calc(100dvh - 24px);border:1px solid rgba(89,208,255,.48);border-radius:28px;overflow:hidden;background:rgba(3,15,34,.9);box-shadow:0 24px 80px rgba(0,0,0,.55),inset 0 0 40px rgba(30,188,255,.08);padding:18px;isolation:isolate}
    .app:before{content:"";position:absolute;inset:0;z-index:-1;opacity:.22;background-image:linear-gradient(rgba(74,203,255,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(74,203,255,.18) 1px,transparent 1px);background-size:42px 42px;mask-image:radial-gradient(circle at center,#000 0%,transparent 80%)}
    .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.back{color:#c8f6ff;text-decoration:none;border:1px solid rgba(96,213,255,.45);border-radius:14px;padding:10px 14px;background:rgba(3,22,44,.72);font-weight:900}.counter{border:1px solid rgba(96,213,255,.45);border-radius:14px;padding:10px 14px;background:rgba(3,22,44,.72);font-weight:900;color:#c9f4ff}.title{margin:0 auto;padding:9px 28px;border-radius:13px;background:linear-gradient(180deg,#123f72,#06142a);color:#fff;font-size:clamp(28px,5vw,46px);letter-spacing:2px;font-weight:950;text-align:center;width:max-content;max-width:100%;box-shadow:0 0 24px rgba(55,189,255,.28)}
    .card{background:rgba(255,255,255,.96);color:#07142b;border-radius:24px;border:1px solid rgba(139,222,255,.55);box-shadow:0 0 34px rgba(37,172,255,.18);padding:18px;margin:12px auto 0;max-width:830px}.desc{max-width:720px;margin:0 auto 12px;text-align:center;font-size:clamp(17px,2.4vw,24px);line-height:1.25;font-weight:850}.diagram-wrap{display:flex;justify-content:center;margin:4px auto 10px}.diagram{width:min(82vw,470px);height:auto;display:block}.question{text-align:center;font-size:clamp(18px,2.5vw,24px);font-weight:950;margin:6px 0 14px}.answers{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin:0 auto;max-width:760px}.answer{height:76px;border:2px solid #cbd3df;border-radius:15px;background:#fff;color:#07142b;font-size:clamp(28px,5vw,44px);font-weight:950;cursor:pointer;box-shadow:0 5px 14px rgba(0,0,0,.08);transition:.12s}.answer:hover,.answer.selected{transform:translateY(-2px);border-color:#2368c9}.answer.correct{background:#168a34;color:#fff;border-color:#168a34}.answer.wrong{background:#b3261e;color:#fff;border-color:#b3261e}.check{display:block;margin:16px auto 0;padding:15px 34px;border:0;border-radius:999px;background:linear-gradient(180deg,#18b8ff,#0963df);color:#fff;font-size:clamp(17px,2.5vw,23px);font-weight:950;cursor:pointer;box-shadow:0 8px 0 #053b8a,0 0 28px rgba(24,184,255,.45)}.check:active{transform:translateY(4px);box-shadow:0 4px 0 #053b8a}.message{min-height:30px;text-align:center;font-size:clamp(18px,2.5vw,23px);font-weight:950;margin-top:12px}
    @media(max-width:560px){body{padding:8px}.app{min-height:calc(100dvh - 16px);border-radius:18px;padding:10px}.top{margin-bottom:8px}.back,.counter{font-size:13px;padding:8px 10px}.title{font-size:28px;padding:8px 18px}.card{border-radius:18px;padding:12px;margin-top:8px}.desc{font-size:16px;line-height:1.22}.diagram{width:min(92vw,350px)}.answers{gap:8px}.answer{height:56px;border-radius:12px}.check{width:100%;padding:13px 14px}.message{font-size:18px}}
    @media(max-width:380px){.desc{font-size:15px}.diagram{width:94vw}.answer{height:50px}.answers{gap:6px}.card{padding:10px}.title{font-size:25px}}
    @media(max-height:720px) and (orientation:landscape){body{align-items:flex-start}.app{min-height:auto}.card{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:center}.desc{grid-column:1/3;font-size:18px}.diagram{width:min(44vw,390px)}.question{margin-top:0}.answers{grid-template-columns:repeat(5,1fr);gap:8px}.answer{height:55px}.check{margin-top:12px}.message{grid-column:1/3}}
  </style>
</head>
<body>
<main class="app">
  <div class="top"><a class="back" href="index.html">← START</a><div class="counter">89 / 100</div></div>
  <div class="title">ZADANIE 89</div>
  <section class="card">
    <div class="desc">Litery i liczby w poniższym kole są ułożone zgodnie z pewną zasadą. Czy potrafisz ustalić, jaką literę należy wpisać zamiast znaku zapytania?</div>
    <div class="diagram-wrap">
      <svg class="diagram" viewBox="0 0 600 600" role="img" aria-label="Koło z liczbami i literami">
        <defs><style>.line{stroke:#07142b;stroke-width:4;stroke-linecap:round}.outer{fill:#fff;stroke:#07142b;stroke-width:7}.txt{font:900 46px Arial,sans-serif;fill:#07142b;text-anchor:middle;dominant-baseline:middle}.letter{font:900 48px Arial,sans-serif;fill:#07142b;text-anchor:middle;dominant-baseline:middle}</style></defs>
        <circle class="outer" cx="300" cy="300" r="270"/><line class="line" x1="300" y1="30" x2="300" y2="570"/><line class="line" x1="30" y1="300" x2="570" y2="300"/><line class="line" x1="109" y1="109" x2="491" y2="491"/><line class="line" x1="491" y1="109" x2="109" y2="491"/>
        <text class="txt" x="390" y="78">6</text><text class="txt" x="510" y="205">12</text><text class="txt" x="510" y="395">21</text><text class="txt" x="390" y="522">9</text><text class="txt" x="210" y="522">3</text><text class="txt" x="90" y="395">24</text><text class="txt" x="90" y="205">18</text><text class="txt" x="210" y="78">15</text>
        <text class="letter" x="350" y="185">?</text><text class="letter" x="425" y="260">P</text><text class="letter" x="390" y="350">L</text><text class="letter" x="350" y="425">J</text><text class="letter" x="250" y="425">D</text><text class="letter" x="210" y="350">H</text><text class="letter" x="175" y="260">N</text><text class="letter" x="250" y="185">F</text>
      </svg>
    </div>
    <div class="question">Wybierz poprawną literę:</div>
    <div class="answers" id="answers"></div>
    <button class="check" id="checkBtn">SPRAWDŹ ODPOWIEDŹ</button>
    <div class="message" id="message"></div>
  </section>
</main>
<script>
  const correctAnswer='B'; const answers=['A','B','D','G','M']; let selected=null;
  const answersBox=document.getElementById('answers'); const message=document.getElementById('message'); const checkBtn=document.getElementById('checkBtn');
  answers.forEach(letter=>{const btn=document.createElement('button');btn.className='answer';btn.textContent=letter;btn.onclick=()=>{selected=letter;document.querySelectorAll('.answer').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');message.textContent='';};answersBox.appendChild(btn);});
  checkBtn.onclick=()=>{if(!selected){message.textContent='Najpierw wybierz odpowiedź.';message.style.color='#b26b00';return;}document.querySelectorAll('.answer').forEach(btn=>{btn.disabled=true;if(btn.textContent===correctAnswer)btn.classList.add('correct');if(btn.textContent===selected&&selected!==correctAnswer)btn.classList.add('wrong');});if(selected===correctAnswer){message.textContent='Dobrze! Poprawna odpowiedź to B.';message.style.color='#168a34';}else{message.textContent='Błędna odpowiedź. Poprawna odpowiedź to B.';message.style.color='#b3261e';}};
  if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js'));}
</script>
</body>
</html>
