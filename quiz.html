<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#06142a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="IQ Test" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <title>Zadanie 89</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#f5f7fb,#e9eef8);color:#07142b;display:flex;justify-content:center;padding:14px}.app{width:100%;max-width:820px;background:#fff;border-radius:18px;padding:18px;box-shadow:0 12px 34px rgba(0,0,0,.16);border:1px solid #dce3ef}.title{width:max-content;max-width:100%;margin:0 auto 14px;padding:10px 34px;border-radius:9px;background:#07142b;color:#fff;font-size:42px;letter-spacing:2px;font-weight:900;text-align:center}.desc{max-width:720px;margin:0 auto 14px;text-align:center;font-size:24px;line-height:1.25;font-weight:800}.diagram-wrap{display:flex;justify-content:center;margin:8px auto 18px}.diagram{width:min(96vw,600px);height:auto;display:block}.question{text-align:center;font-size:24px;font-weight:900;margin:6px 0 18px}.answers{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;margin:0 auto;max-width:760px}.answer{height:92px;border:2px solid #cbd3df;border-radius:13px;background:#fff;color:#07142b;font-size:46px;font-weight:900;cursor:pointer;box-shadow:0 5px 14px rgba(0,0,0,.08);transition:.12s}.answer:hover{transform:translateY(-2px);border-color:#2f69c9}.answer.correct{background:#168a34;color:#fff;border-color:#168a34}.answer.wrong{background:#b3261e;color:#fff;border-color:#b3261e}.check{display:block;margin:22px auto 0;padding:16px 36px;border:0;border-radius:8px;background:#2368c9;color:#fff;font-size:24px;font-weight:900;cursor:pointer;box-shadow:0 6px 0 #15458a}.check:active{transform:translateY(4px);box-shadow:0 2px 0 #15458a}.message{min-height:34px;text-align:center;font-size:24px;font-weight:900;margin-top:16px}@media(max-width:560px){.app{padding:12px}.title{font-size:30px;padding:9px 22px}.desc{font-size:18px}.question{font-size:19px}.answers{gap:8px}.answer{height:64px;font-size:32px}.check{font-size:18px;padding:13px 18px}.message{font-size:20px}}
  </style>
</head>
<body>
<main class="app">
  <div class="title">ZADANIE 89</div>
  <div class="desc">Litery i liczby w poniższym kole są ułożone zgodnie z pewną zasadą. Czy potrafisz ustalić, jaką literę należy wpisać zamiast znaku zapytania?</div>

  <div class="diagram-wrap">
    <svg class="diagram" viewBox="0 0 600 600" role="img" aria-label="Koło z liczbami i literami">
      <defs><style>.line{stroke:#07142b;stroke-width:4;stroke-linecap:round}.outer{fill:#fff;stroke:#07142b;stroke-width:7}.txt{font:900 46px Arial, sans-serif;fill:#07142b;text-anchor:middle;dominant-baseline:middle}.letter{font:900 48px Arial, sans-serif;fill:#07142b;text-anchor:middle;dominant-baseline:middle}</style></defs>
      <circle class="outer" cx="300" cy="300" r="270"/>
      <line class="line" x1="300" y1="30" x2="300" y2="570"/>
      <line class="line" x1="30" y1="300" x2="570" y2="300"/>
      <line class="line" x1="109" y1="109" x2="491" y2="491"/>
      <line class="line" x1="491" y1="109" x2="109" y2="491"/>

      <text class="txt" x="390" y="78">6</text>
      <text class="txt" x="510" y="205">12</text>
      <text class="txt" x="510" y="395">21</text>
      <text class="txt" x="390" y="522">9</text>
      <text class="txt" x="210" y="522">3</text>
      <text class="txt" x="90" y="395">24</text>
      <text class="txt" x="90" y="205">18</text>
      <text class="txt" x="210" y="78">15</text>

      <text class="letter" x="350" y="185">?</text>
      <text class="letter" x="425" y="260">P</text>
      <text class="letter" x="390" y="350">L</text>
      <text class="letter" x="350" y="425">J</text>
      <text class="letter" x="250" y="425">D</text>
      <text class="letter" x="210" y="350">H</text>
      <text class="letter" x="175" y="260">N</text>
      <text class="letter" x="250" y="185">F</text>
    </svg>
  </div>

  <div class="question">Wybierz poprawną literę:</div>
  <div class="answers" id="answers"></div>
  <button class="check" id="checkBtn">SPRAWDŹ ODPOWIEDŹ</button>
  <div class="message" id="message"></div>
</main>
<script>
  const correctAnswer = 'B';
  const answers = ['A','B','D','G','M'];
  let selected = null;
  const answersBox = document.getElementById('answers');
  const message = document.getElementById('message');
  const checkBtn = document.getElementById('checkBtn');

  answers.forEach(letter=>{
    const btn=document.createElement('button');
    btn.className='answer';
    btn.textContent=letter;
    btn.onclick=()=>{
      selected=letter;
      document.querySelectorAll('.answer').forEach(b=>b.style.borderColor='#cbd3df');
      btn.style.borderColor='#2368c9';
      message.textContent='';
    };
    answersBox.appendChild(btn);
  });

  checkBtn.onclick=()=>{
    if(!selected){message.textContent='Najpierw wybierz odpowiedź.';message.style.color='#b26b00';return;}
    document.querySelectorAll('.answer').forEach(btn=>{
      btn.disabled=true;
      if(btn.textContent===correctAnswer) btn.classList.add('correct');
      if(btn.textContent===selected && selected!==correctAnswer) btn.classList.add('wrong');
    });
    if(selected===correctAnswer){message.textContent='Dobrze! Poprawna odpowiedź to B.';message.style.color='#168a34';}
    else{message.textContent='Błędna odpowiedź. Poprawna odpowiedź to B.';message.style.color='#b3261e';}
  };
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js');
    });
  }
</script>
</body>
</html>
